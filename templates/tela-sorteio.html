<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorteio Especial</title>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #03152d;
      --bg2: #071f46;
      --card: rgba(20, 42, 82, 0.94);
      --card-border: rgba(255,255,255,0.10);
      --text: #ffffff;
      --muted: rgba(255,255,255,0.75);
      --gold: #ffd35c;
      --blue-soft: rgba(255,255,255,0.08);
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #11365d 0%, #071b3b 38%, #020814 100%);
      overflow-x: hidden;
    }

    body { padding: 14px; }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 14px 32px rgba(0,0,0,0.24);
      margin-bottom: 14px;
    }

    .badge {
      display: inline-block;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--gold);
      font-weight: 700;
      font-size: 12px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 8vw, 64px);
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: clamp(16px, 4vw, 28px);
      line-height: 1.35;
    }

    .slot-wrapper {
      position: relative;
      min-height: 220px;
      border-radius: 20px;
      padding: 12px;
      background: radial-gradient(circle at center, rgba(23, 55, 115, 0.55) 0%, rgba(7, 18, 40, 0.95) 70%);
      border: 1px solid rgba(255,255,255,0.10);
      overflow: hidden;
    }

    .slot-mask {
      position: relative;
      height: 180px;
      overflow: hidden;
      border-radius: 18px;
      border: 2px solid rgba(255, 211, 92, 0.82);
      box-shadow: 0 0 18px rgba(255, 211, 92, 0.20), inset 0 0 25px rgba(0,0,0,0.22);
      background: rgba(255,255,255,0.03);
    }

    .slot-highlight {
      position: absolute;
      left: 10px;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      height: 60px;
      border-radius: 14px;
      border: 2px solid rgba(255, 211, 92, 0.95);
      box-shadow: 0 0 16px rgba(255, 211, 92, 0.30);
      pointer-events: none;
      z-index: 2;
    }

    .slot-list {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      will-change: transform;
      padding: 60px 0;
    }

    .slot-item {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 10px;
      font-size: clamp(18px, 5vw, 34px);
      font-weight: 800;
      line-height: 1.15;
      color: rgba(255,255,255,0.96);
      word-break: break-word;
    }

    .waiting {
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: var(--muted);
      font-size: clamp(18px, 5vw, 30px);
      font-weight: 700;
      padding: 16px;
      line-height: 1.3;
    }

    .loader-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      text-align: center;
    }

    .loader {
      width: 50px;
      height: 50px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top: 5px solid #4fd1ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      100% { transform: rotate(360deg); }
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .stat-box {
      background: var(--blue-soft);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      min-height: 96px;
    }

    .stat-title {
      font-size: 15px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: clamp(24px, 8vw, 44px);
      font-weight: 1000;
      line-height: 1;
    }

    .winner-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 14px;
      z-index: 9999;
      background: rgba(3, 10, 24, 0.52);
      backdrop-filter: blur(8px);
    }

    .winner-overlay.show {
      display: flex;
      animation: fadeInOverlay 0.35s ease;
    }

    .winner-panel {
      width: min(100%, 920px);
      max-height: 90vh;
      overflow-y: auto;
      text-align: center;
      background: linear-gradient(180deg, rgba(16,35,70,0.98), rgba(12,28,58,0.99));
      border: 2px solid rgba(255, 211, 92, 0.70);
      border-radius: 24px;
      padding: 22px 16px;
      box-shadow: 0 0 28px rgba(255, 211, 92, 0.16), 0 22px 60px rgba(0,0,0,0.42);
      transform: scale(0.9);
      opacity: 0;
    }

    .winner-overlay.show .winner-panel {
      animation: popWinner 0.45s ease forwards;
    }

    .winner-name {
      margin: 10px 0 16px;
      font-size: clamp(28px, 8vw, 70px);
      font-weight: 900;
      color: var(--gold);
      line-height: 1.05;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255, 211, 92, 0.22);
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    .winner-meta {
      font-size: clamp(18px, 4.8vw, 32px);
      line-height: 1.45;
      color: rgba(255,255,255,0.96);
      word-break: break-word;
    }

    .winner-meta strong { color: #ffffff; }

    @keyframes popWinner {
      0% { transform: scale(0.9) translateY(14px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }

    @keyframes fadeInOverlay {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (min-width: 700px) {
      body { padding: 20px; }

      .card {
        border-radius: 28px;
        padding: 24px;
        margin-bottom: 18px;
      }

      .slot-wrapper {
        min-height: 280px;
        padding: 18px;
      }

      .slot-mask { height: 220px; }

      .slot-highlight {
        left: 18px;
        right: 18px;
        height: 64px;
        border-radius: 16px;
        border-width: 3px;
      }

      .slot-list { padding: 80px 0; }

      .slot-item { height: 64px; }

      .waiting { min-height: 220px; }

      .stats {
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
      }

      .stat-box {
        border-radius: 22px;
        padding: 22px;
        min-height: 120px;
      }

      .winner-overlay { padding: 24px; }

      .winner-panel {
        border-radius: 30px;
        padding: 34px 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="badge">🏆 UNDIME - ARACAJU / SE</div>
      <h1>Sorteio Show de Imagem</h1>
      <p class="subtitle">Parabéns! Sua chance já está garantida no sorteio da Show de Imagem & UnionBoard. <br> Boa sorte!</p>
    </div>

    <div class="card">
      <div class="slot-wrapper">
        <div id="waitingBox" class="waiting">
          <div class="loader-container">
            <div class="loader"></div>
            <p>Aguardando sorteio...</p>
          </div>
        </div>

        <div id="slotArea" style="display:none;">
          <div class="slot-mask" id="slotMask">
            <div class="slot-highlight"></div>
            <div class="slot-list" id="slotList"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="stats">
        <div class="stat-box">
          <div class="stat-title">Total de participantes</div>
          <div class="stat-value" id="totalParticipantes">+100</div>
        </div>

        <div class="stat-box">
          <div class="stat-title">Status</div>
          <div class="stat-value" id="statusTexto">Recebendo participantes</div>
        </div>

        <div class="stat-box">
          <div class="stat-title">Revelação em</div>
          <div class="stat-value" id="timer">--</div>
        </div>
      </div>
    </div>
  </div>

  <div class="winner-overlay" id="winnerOverlay">
    <div class="winner-panel">
      <div class="badge">🎉 Ganhador revelado</div>
      <div class="winner-name" id="winnerName">-</div>
      <div class="winner-meta" id="winnerMeta">-</div>
    </div>
  </div>

  <script>
  const socket = io();

  const slotList = document.getElementById("slotList");
  const slotMask = document.getElementById("slotMask");
  const statusTextoEl = document.getElementById("statusTexto");
  const timerEl = document.getElementById("timer");
  const totalParticipantesEl = document.getElementById("totalParticipantes");
  const waitingBoxEl = document.getElementById("waitingBox");
  const slotAreaEl = document.getElementById("slotArea");

  const winnerOverlayEl = document.getElementById("winnerOverlay");
  const winnerNameEl = document.getElementById("winnerName");
  const winnerMetaEl = document.getElementById("winnerMeta");

  let rollingList = [];
  let sorteadoFinal = null;
  let participanteExibido = null;
  let animationFrame = null;
  let countdownInterval = null;
  let offset = 0;
  let velocidade = 22;
  let itemHeight = 60;
  const repeticoes = 20;
  const duracaoRevelacao = 8;
  let resultadoMostrado = false;

  function atualizarTransform() {
    slotList.style.transform = `translateY(${-offset}px)`;
  }

  function pararAnimacao() {
    if (animationFrame) {
      cancelAnimationFrame(animationFrame);
      animationFrame = null;
    }
  }

  function obterAlturaItem() {
    const item = slotList.querySelector(".slot-item");
    if (!item) return;
    itemHeight = item.getBoundingClientRect().height || item.offsetHeight || 60;
  }

  function obterPaddingTopoLista() {
    const estilos = getComputedStyle(slotList);
    return parseFloat(estilos.paddingTop) || 0;
  }

  function iniciarRolagem() {
    pararAnimacao();

    function animar() {
      offset += velocidade;

      const totalAltura = rollingList.length * itemHeight;
      const metadeLoop = totalAltura / 2;

      if (offset >= metadeLoop) {
        offset -= metadeLoop;
      }

      atualizarTransform();
      animationFrame = requestAnimationFrame(animar);
    }

    animationFrame = requestAnimationFrame(animar);
  }

  function iniciarTimer() {
    let tempo = duracaoRevelacao;
    timerEl.textContent = tempo;
    statusTextoEl.textContent = "Sorteando";

    clearInterval(countdownInterval);

    countdownInterval = setInterval(() => {
      tempo--;
      timerEl.textContent = tempo > 0 ? tempo : 0;

      if (tempo <= 0) {
        clearInterval(countdownInterval);
        revelarGanhador();
      }
    }, 1000);
  }

  function processarNovoSorteio(data) {
    if (!data || !Array.isArray(data.participantes) || !data.sorteado) return;

    const participantes = data.participantes;
    sorteadoFinal = data.sorteado;
    participanteExibido = null;
    resultadoMostrado = false;

    waitingBoxEl.style.display = "none";
    slotAreaEl.style.display = "block";
    winnerOverlayEl.classList.remove("show");

    offset = 0;
    velocidade = window.innerWidth < 700 ? 18 : 26;

    rollingList = [];
    for (let i = 0; i < repeticoes; i++) {
      rollingList.push(...participantes);
    }

    slotList.innerHTML = rollingList
      .map((p) => `<div class="slot-item">${p.nome ?? ""}</div>`)
      .join("");

    obterAlturaItem();
    atualizarTransform();
    iniciarRolagem();
    iniciarTimer();
  }

  function revelarGanhador() {
    if (!sorteadoFinal || resultadoMostrado) return;

    resultadoMostrado = true;
    statusTextoEl.textContent = "Ganhador revelado";

    const totalAltura = rollingList.length * itemHeight;
    const metadeLoop = totalAltura / 2;
    const offsetNormalizado = ((offset % metadeLoop) + metadeLoop) % metadeLoop;
    const paddingTopo = obterPaddingTopoLista();

    const indices = [];
    rollingList.forEach((p, i) => {
      if (String(p.id) === String(sorteadoFinal.id)) {
        indices.push(i);
      }
    });

    if (!indices.length) {
      console.error("Ganhador não encontrado na lista");
      return;
    }

    participanteExibido = rollingList[indices[0]];

    const centro = slotMask.offsetHeight / 2;
    let melhorDestino = null;
    let menorDistancia = Infinity;

    for (const indice of indices) {
      let pos = paddingTopo + (indice * itemHeight) - centro + (itemHeight / 2);

      while (pos <= offsetNormalizado + itemHeight * 2) {
        pos += metadeLoop;
      }

      const distancia = pos - offsetNormalizado;
      if (distancia < menorDistancia) {
        menorDistancia = distancia;
        melhorDestino = pos;
      }
    }

    const start = offsetNormalizado;
    const destino = melhorDestino;
    const duration = 1800;
    let startTime = null;

    function easeOut(t) {
      return 1 - Math.pow(1 - t, 4);
    }

    pararAnimacao();

    function animarFinal(timestamp) {
      if (!startTime) startTime = timestamp;

      let progress = (timestamp - startTime) / duration;
      if (progress > 1) progress = 1;

      const eased = easeOut(progress);
      offset = start + (destino - start) * eased;

      atualizarTransform();

      if (progress < 1) {
        animationFrame = requestAnimationFrame(animarFinal);
      } else {
        offset = destino;
        atualizarTransform();
        mostrarResultado();
      }
    }

    animationFrame = requestAnimationFrame(animarFinal);
  }

  function mostrarResultado() {
    const vencedor = participanteExibido || sorteadoFinal || {};

    winnerNameEl.textContent = vencedor.nome || "-";
    winnerMetaEl.innerHTML = `
      <strong>Cargo:</strong> ${vencedor.cargo || "-"}<br>
      <strong>Município:</strong> ${vencedor.municipio || "-"}<br>
      <strong>Estado:</strong> ${vencedor.estado || "-"}<br>
    `;

    winnerOverlayEl.classList.add("show");

    confetti({
      particleCount: 150,
      spread: 100,
      origin: { y: 0.6 }
    });
  }

  socket.on("novo_sorteio", processarNovoSorteio);

  window.addEventListener("resize", () => {
    if (slotAreaEl.style.display !== "none") {
      obterAlturaItem();
    }
  });
  </script>
</body>
</html>
