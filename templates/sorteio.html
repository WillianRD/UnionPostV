<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sorteio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f4f7fb;
      font-family: system-ui;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card-form {
      width: 100%;
      max-width: 420px;
      background: #fff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 20px;
      text-align: center;
    }

    .form-control, .form-select {
      height: 48px;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .btn-submit {
      height: 50px;
      border-radius: 10px;
      font-weight: 700;
    }

    .countdown {
      font-size: 0.8rem;
      color: #64748b;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="card-form">

    <h1>Participar do sorteio</h1>

    <form method="POST">

      <input type="text" name="name" class="form-control" placeholder="Nome completo" required>

      <input type="tel" name="telefone" class="form-control" placeholder="Telefone" required>

      <select name="estado" class="form-select" required>
        <option value="">Estado</option>
        <option>SP</option>
        <option>RJ</option>
        <option>MG</option>
      </select>

      <input type="text" name="municipio" class="form-control" placeholder="Município" required>

      <select name="cargo" class="form-select" required>
        <option value="">Cargo</option>
        <option>Prefeito</option>
        <option>Secretário</option>
        <option>Professor</option>
        <option>Outro</option>
      </select>

      <div class="d-grid mt-2">
        <button type="submit" class="btn btn-primary btn-submit">
          Participar
        </button>
      </div>

      <div id="countdown" class="countdown">
        Tempo: 03:00
      </div>

    </form>

  </div>

  <script>
    let tempo = 180;
    const el = document.getElementById("countdown");

    function update() {
      const m = String(Math.floor(tempo / 60)).padStart(2, '0');
      const s = String(tempo % 60).padStart(2, '0');

      el.textContent = `Tempo: ${m}:${s}`;

      if (tempo <= 0) {
        el.textContent = "Encerrado";
        el.style.color = "#dc2626";
        return;
      }

      tempo--;
    }

    update();
    setInterval(update, 1000);
  </script>

</body>

</html>
