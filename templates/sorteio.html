<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sorteio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    :root {
      --bg: #eef4fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #dbe4f0;
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.10);
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card-form {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      padding: 32px 28px 24px;
      border-radius: 20px;
      box-shadow: var(--shadow);
    }

    .logo-wrap {
      text-align: center;
      margin-bottom: 18px;
    }

    .logo-wrap img {
      max-width: 140px;
      max-height: 70px;
      object-fit: contain;
    }

    h1 {
      font-size: 1.7rem;
      font-weight: 800;
      margin-bottom: 6px;
      text-align: center;
      color: var(--text);
    }

    .subtitle {
      text-align: center;
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .form-label {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .form-control,
    .form-select {
      height: 52px;
      border-radius: 12px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      background: #f8fbff;
      box-shadow: none;
    }

    .form-control:focus,
    .form-select:focus {
      background: #fff;
      border-color: #93c5fd;
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.10);
    }

    .btn-submit {
      height: 52px;
      border-radius: 12px;
      font-weight: 700;
      border: none;
      background: var(--primary);
    }

    .btn-submit:hover {
      background: var(--primary-hover);
    }

    .timer-box {
      text-align: center;
      margin-top: 14px;
    }

    .countdown {
      font-size: 0.82rem;
      color: var(--muted);
      margin: 0;
    }
  </style>
</head>

<body>

  <div class="card-form">

    <div class="logo-wrap">
      <img src="{{ url_for('static', filename='Logo/logo.webp') }}" alt="Logo da Empresa">
    </div>

    <h1>Participar do sorteio</h1>
    <p class="subtitle">Preencha seus dados para continuar</p>

    <form method="POST">

      <input type="text" name="name" class="form-control" placeholder="Nome completo" required>

      <input type="tel" name="telefone" id="telefone" class="form-control" placeholder="Telefone" maxlength="15" required>

      <div class="mb-3">
        <label for="estado" class="form-label">Estado</label>
        <select id="estado" name="estado" class="form-select" required>
          <option value="">Selecione o estado</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="municipio" class="form-label">Município</label>
        <select id="municipio" name="municipio" class="form-select" required>
          <option value="">Selecione o município</option>
        </select>
      </div>

      <div class="mb-3">
        <label for="cargo" class="form-label">Cargo</label>
        <select id="cargo" name="cargo" class="form-select" required>
          <option value="">Selecione seu cargo</option>
          <option value="Prefeito">Prefeito</option>
          <option value="Vereador">Vereador</option>
          <option value="Dirigente Municipal de Educação">Dirigente Municipal de Educação</option>
          <option value="Secretário de Educação">Secretário de Educação</option>
          <option value="Secretário Adjunto de Educação">Secretário Adjunto de Educação</option>
          <option value="Subsecretário de Educação">Subsecretário de Educação</option>
          <option value="Diretor de Ensino">Diretor de Ensino</option>
          <option value="Diretor Escolar">Diretor Escolar</option>
          <option value="Vice-diretor">Vice-diretor</option>
          <option value="Coordenador Pedagógico">Coordenador Pedagógico</option>
          <option value="Coordenador Educacional">Coordenador Educacional</option>
          <option value="Coordenador de Projetos">Coordenador de Projetos</option>
          <option value="Supervisor de Ensino">Supervisor de Ensino</option>
          <option value="Orientador Educacional">Orientador Educacional</option>
          <option value="Professor">Professor</option>
          <option value="Técnico Educacional">Técnico Educacional</option>
          <option value="Técnico Pedagógico">Técnico Pedagógico</option>
          <option value="Técnico">Técnico</option>
          <option value="Gestor de Programas Educacionais">Gestor de Programas Educacionais</option>
          <option value="Coordenador do Fundeb">Coordenador do Fundeb</option>
          <option value="Coordenador da Merenda Escolar">Coordenador da Merenda Escolar</option>
          <option value="Analista Educacional">Analista Educacional</option>
          <option value="Gestor de Tecnologia Educacional">Gestor de Tecnologia Educacional</option>
          <option value="Outro">Outro</option>
        </select>
      </div>

      <div class="d-grid">
<button type="submit" id="btnSubmit" class="btn btn-primary btn-submit">
              Participar
        </button>
      </div>
      <div id="mensagemSucesso" style="display:none; text-align:center; margin-top:15px;">
  <div style="
    background:#ecfdf5;
    border:1px solid #bbf7d0;
    color:#166534;
    padding:12px;
    border-radius:10px;
    font-weight:600;
  ">
    ✅ Seus dados já foram enviados<br>
    Aguarde até o sorteio começar
  </div>
</div>


      <div class="timer-box">
        <p id="timerRedirect" class="countdown">Esta tela será atualizada em 02:00</p>
      </div>

    </form>
  </div>

  <script>
    let tempo = 60;
    const el = document.getElementById("timerRedirect");

    function updateTimer() {
      const m = String(Math.floor(tempo / 60)).padStart(2, '0');
      const s = String(tempo % 60).padStart(2, '0');

      if (el) {
        el.textContent = `Esta tela será atualizada em ${m}:${s}`;
      }

      if (tempo <= 0) {
        window.location.href = "/";
        return;
      }

      tempo--;
    }

    updateTimer();
    setInterval(updateTimer, 1000);

    const telefoneInput = document.getElementById('telefone');

    telefoneInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');

      if (value.length > 11) value = value.slice(0, 11);

      if (value.length > 10) {
        value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
      } else if (value.length > 6) {
        value = value.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
      } else if (value.length > 2) {
        value = value.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
      } else if (value.length > 0) {
        value = value.replace(/^(\d{0,2})/, '($1');
      }

      e.target.value = value;
    });

const form = document.querySelector('form');
const btn = document.getElementById('btnSubmit');
const mensagem = document.getElementById('mensagemSucesso');

form.addEventListener('submit', function (e) {

  e.preventDefault(); // 👉 ESSA LINHA RESOLVE SEU PROBLEMA

  const num = telefoneInput.value.replace(/\D/g, '');

  if (num.length < 10) {
    alert('Por favor, digite um telefone válido com DDD.');
    return;
  }

  // muda botão
  btn.innerText = "Enviado";
  btn.disabled = true;

  // mostra mensagem
  mensagem.style.display = "block";

  // trava campos
  form.querySelectorAll("input, select").forEach(el => el.disabled = true);

  // 👉 envia depois de 1.5s
  setTimeout(() => {
    form.submit();
  }, 60000);
});

    async function carregarEstados() {
      const url = "https://servicodados.ibge.gov.br/api/v1/localidades/estados";
      const resposta = await fetch(url);
      const estados = await resposta.json();
      const select = document.getElementById("estado");

      estados.sort((a, b) => a.nome.localeCompare(b.nome));

      estados.forEach(estado => {
        const option = document.createElement("option");
        option.value = estado.sigla;
        option.textContent = estado.nome;
        select.appendChild(option);
      });
    }

    carregarEstados();

    document.getElementById("estado").addEventListener("change", async function () {
      const uf = this.value;
      const municipioSelect = document.getElementById("municipio");

      if (!uf) {
        municipioSelect.innerHTML = '<option value="">Selecione o município</option>';
        return;
      }

      const url = `https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`;
      const resposta = await fetch(url);
      const municipios = await resposta.json();

      municipioSelect.innerHTML = '<option value="">Selecione o município</option>';

      municipios.forEach(m => {
        const option = document.createElement("option");
        option.value = m.nome;
        option.textContent = m.nome;
        municipioSelect.appendChild(option);
      });
    });
  </script>

</body>

</html>
