<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Undime — Enviar Dados</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <!-- Bootstrap Icons (para ícones nos campos) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Fonte opcional -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
  <link rel="shortcut icon" href="../static/Logo/logo.ico" type="imgem/x-icon">
  <style>
    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --accent: #22c55e;
      --bg1: #0f172a;
      --bg2: #1e3a8a;
      --radius: 18px;
    }

    body {
      font-family: 'Noto Sans', system-ui;
      min-height: 100vh;

      background:
        radial-gradient(60rem 40rem at -10% -10%, rgba(59, 130, 246, .25), transparent),
        radial-gradient(60rem 40rem at 110% 10%, rgba(37, 99, 235, .25), transparent),
        linear-gradient(135deg, var(--bg1), var(--bg2));

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card-lg {

      max-width: 620px;
      width: 100%;

      background: rgba(255, 255, 255, .92);

      backdrop-filter: blur(14px);

      border-radius: var(--radius);

      padding: 45px;

      box-shadow:
        0 40px 80px rgba(0, 0, 0, .35),
        inset 0 1px rgba(255, 255, 255, .3);

      border: 1px solid rgba(255, 255, 255, .15);

      animation: fade .6s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1
      }
    }

    .brand img {
      width: 200px;
      margin-bottom: 10px;
    }

    .brand h1 {
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }

    .brand .sub {
      color: #64748b;
      font-size: .95rem;
    }

    .form-label {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .input-icon {
      position: relative;
    }

    .input-icon .bi {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
    }

    .form-control {

      background: #f8fafc;

      border: 1px solid #e2e8f0;

      padding: 14px 14px 14px 40px;

      border-radius: 12px;

      transition: .25s;

      font-size: 15px;
    }

    .form-control:focus {

      background: white;

      border-color: var(--brand);

      box-shadow: 0 0 0 4px rgba(37, 99, 235, .15);

      transform: translateY(-1px);
    }

    .btn-primary {

      background: linear-gradient(135deg, #22c55e, #16a34a);

      border: none;

      padding: 16px;

      font-weight: 700;

      border-radius: 12px;

      transition: .25s;

      letter-spacing: .4px;
    }

    .btn-primary:hover {

      transform: translateY(-2px);

      box-shadow: 0 12px 25px rgba(0, 0, 0, .25);
    }

    .btn-primary:active {
      transform: scale(.98);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
      margin: 18px 0 26px;
    }

    .footer {
      text-align: center;
      font-size: .85rem;
      color: #64748b;
      margin-top: 15px;
    }

    .modal {
  display: none;
  position: fixed;
  z-index: 999;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0,0,0,0.5);
}

.modal-content {
  background: #fff;
  padding: 20px;
  margin: 15% auto;
  width: 300px;
  border-radius: 12px;
  text-align: center;
}

.modal-content button {
  margin-top: 10px;
  padding: 8px 16px;
  border: none;
  background: #e74c3c;
  color: #fff;
  border-radius: 6px;
  cursor: pointer;
}

/* Corrige o container do Select2 */
.select2-container .select2-selection--single {
  height: 52px !important;
  border-radius: 12px !important;
  border: 1px solid #e2e8f0 !important;
  background: #f8fafc !important;
  display: flex;
  align-items: center;
  padding-left: 40px;
  font-size: 15px;
}

/* Texto selecionado */
.select2-container--default .select2-selection--single .select2-selection__rendered {
  color: #111;
  line-height: normal !important;
}

/* Ícone da seta */
.select2-container--default .select2-selection--single .select2-selection__arrow {
  height: 100%;
  right: 10px;
}

/* Campo de busca interno */
.select2-search__field {
  padding: 10px !important;
}

/* Dropdown */
.select2-dropdown {
  border-radius: 12px !important;
  border: 1px solid #e2e8f0 !important;
}

/* Hover e foco */
.select2-container--default.select2-container--focus .select2-selection--single {
  border-color: #2563eb !important;
  box-shadow: 0 0 0 4px rgba(37, 99, 235, .15) !important;
}
  </style>
</head>

<body>
  <div class="shell">
    <div class="card card-lg p-4 p-md-5">
      <!-- Cabeçalho com logo -->
      <div class="brand mb-3">
        <div class="brand mb-3 text-center">
          <!-- <a href="https://www.unionboard.com.br" target="_blank" rel="noopener noreferrer"> -->
          <img src="{{ url_for('static', filename='Logo/logo.webp') }}" alt="Logo da Empresa"
            style="width: 180px; height: auto; margin-bottom: 10px;">
          </a>
        </div>

        <h1 class="text-center">União dos Dirigentes Municipais</h1>
      </div>

      {% if mensagem %}
      <div class="alert alert-success" role="alert">
        {{ mensagem }}
      </div>
      {% endif %}

      <div class="divider"></div>

      <form action="/" method="POST" novalidate>
        <div class="mb-3">
          <label for="name" class="form-label">Nome</label>
          <div class="input-icon">
            <i class="bi bi-person"></i>
            <input id="name" name="name" type="text" class="form-control" placeholder="Seu nome" required>
          </div>
        </div>

                <div class="mb-3">
          <label for="telefone" class="form-label">Telefone (WhatsApp)</label>
          <div class="input-icon">
            <i class="bi bi-telephone"></i>
            <input id="telefone" name="telefone" type="tel" class="form-control" placeholder="(00) 00000-0000"
              maxlength="15" required>

        </div>

        <div class="mb-3">

          <div class="mb-3">
  <label for="municipio" class="form-label">Estado</label>
<select id="estado" name="estado" class="form-control" required>
<option value="">Selecione o estado</option>
</select>

</div>

<div class="mb-3">
  <label for="municipio" class="form-label">Município</label>
  
  <div class="input-icon">
    <i class="bi bi-geo-alt"></i>

    <select id="municipio" name="municipio" class="form-control" required>
      <option value="">Selecione o município</option>
    </select>

  </div>
</div>

       <!--
<div class="mb-3">
          <label for="municipio" class="form-label">Municipio</label>
          <div class="input-icon">
            <i class="bi bi-person"></i>
            <input id="municipio" name="municipio" type="text" class="form-control">
          </div>
        </div>
       --> 


<div class="mb-3">
  <label for="cargo" class="form-label">Cargo</label>

  <div class="input-icon">
    <i class="bi bi-person-badge"></i>

<select id="cargo" name="cargo" class="form-control" required>

<option value="">Selecione seu cargo</option>
<option value="Prefeito">Prefeito</option>
<option value="Vereador">Vereador</option>
<option value="Dirigente Municipal de Educação">Dirigente Municipal de Educação</option>
<option value="Secretário de Educação">Secretário de Educação</option>
<option value="Secretário Adjunto de Educação">Secretário Adjunto de Educação</option>

<option value="Subsecretário de Educação">Subsecretário de Educação</option>

<option value="Diretor de Ensino">Diretor de Ensino</option>
<option value="Diretor Escolar">Diretor Escolar</option>
<option value="Vice-diretor">Vice-diretor</option>

<option value="Coordenador Pedagógico">Coordenador Pedagógico</option>
<option value="Coordenador Educacional">Coordenador Educacional</option>
<option value="Coordenador de Projetos">Coordenador de Projetos</option>

<option value="Supervisor de Ensino">Supervisor de Ensino</option>
<option value="Orientador Educacional">Orientador Educacional</option>

<option value="Professor">Professor</option>

<option value="Técnico Educacional">Técnico Educacional</option>
<option value="Técnico Pedagógico">Técnico Pedagógico</option>
<option value="Técnico Pedagógico">Técnico</option>
<option value="Gestor de Programas Educacionais">Gestor de Programas Educacionais</option>
<option value="Coordenador do Fundeb">Coordenador do Fundeb</option>
<option value="Coordenador da Merenda Escolar">Coordenador da Merenda Escolar</option>
<option value="Analista Educacional">Analista Educacional</option>
<option value="Gestor de Tecnologia Educacional">Gestor de Tecnologia Educacional</option>
<option value="Outro">Outro</option>

</select>

  </div>
</div>

        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary btn-lg">Enviar Dados</button>
        </div>
      </form>

      <p class="text-center text-muted mt-3 mb-0" style="font-size:.9rem;">
        Seus dados são usados apenas para contato futuro
      </p>
    </div>
  </div>

<div id="modalErro" class="modal">
  <div class="modal-content">
    <p id="mensagemErro"></p>
    <button onclick="fecharModal()">OK</button>
  </div>
</div>

<script>
function sortear() {
    fetch('/sortear-dme')
        .then(res => res.json())
        .then(data => {
            alert("Sorteado: " + data.nome);
        });
}
</script>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
  <!-- JS Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <script>
$(document).ready(function() {
  $('#municipio').select2({
    placeholder: "Buscar município...",
    width: '100%'
  });
});

const telefoneInput = document.getElementById('telefone');

    telefoneInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 11) value = value.slice(0, 11);

      if (value.length > 10) {
        value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
      } else if (value.length > 6) {
        value = value.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
      } else if (value.length > 2) {
        value = value.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
      } else if (value.length > 0) {
        value = value.replace(/^(\d{0,2})/, '($1');
      }
      e.target.value = value;
    });

    document.querySelector('form')?.addEventListener('submit', (e) => {
      const num = telefoneInput.value.replace(/\D/g, '');
      if (num.length < 10) {
        alert('Por favor, digite um telefone válido com DDD.');
        e.preventDefault();
      }
    });


async function carregarEstados(){

const url = "https://servicodados.ibge.gov.br/api/v1/localidades/estados"

const resposta = await fetch(url)

const estados = await resposta.json()

const select = document.getElementById("estado")

estados.sort((a,b)=>a.nome.localeCompare(b.nome))

estados.forEach(estado => {

const option = document.createElement("option")

option.value = estado.sigla
option.textContent = estado.nome

select.appendChild(option)

})

}

carregarEstados()

document.getElementById("estado").addEventListener("change", async function(){

const uf = this.value

const municipioSelect = document.getElementById("municipio")

const url = `https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`

const resposta = await fetch(url)

const municipios = await resposta.json()

municipioSelect.innerHTML = ""
municipioSelect.innerHTML = '<option value="">Selecione o município</option>'

municipios.forEach(m => {
  const option = document.createElement("option")
  option.value = m.nome
  option.textContent = m.nome
  municipioSelect.appendChild(option)
})

// 🔥 ATUALIZA O SELECT2
$('#municipio').select2('destroy')

$('#municipio').select2({
  placeholder: "Buscar município...",
  width: '100%'
})

})



  </script>
</body>

</html>
