<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cadastro de Produto</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      background-color: #ffffff;
      font-family: 'Noto Sans', sans-serif;
      background-position: center;
    }

    .container {
      max-width: 600px;
      background: rgb(255, 251, 251);
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(254, 253, 253, 0.1);
      margin-top: 50px;
    }

    .form-label {
      font-weight: bold;
    }

    .btn-primary {
      width: 100%;
      background-color: #28a745;
      border: none;
    }

    .btn-btn-primary {
      width: 100%;
      background-color: rgb(0, 153, 255);
    }

    .btn-primary:hover {
      background-color: #218838;
    }
  </style>      
</head>

<body>
  <div class="container">
    <h2 class="text-center mb-4">UnionPost</h2>
    {% if mensagem %}
    <div class="alert alert-success" role="alert">
      {{ mensagem }}
    </div>
    {% endif %}
    <form action="/" method="POST">

      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input name="name" type="text" class="form-control" placeholder="Seu nome" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Marketplace</label>
        <select name="categoria" class="form-select" required>
          <option value="" selected disabled>Selecione uma opção</option>
          <option value="Mercado Livre" required">Mercado Livre</option> 
          <option value="Amazon">Amazon</option>
          <option value="Olist">Olist</option>
          <option value="Magalu">Magalu</option>
          <option value="Loja">Loja Virtual</option>

        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Produto</label>
        <select name="produto" class="form-select" required>
          <option value="" selected disabled>Selecione um produto</option>
          <option value="Moldura Interativa">Moldura Interativa</option>
          <option value="Lousa Interatica">Lousa Interativa</option>
        </select>
        <!--<textarea name="descricao" class="form-control" rows="3" placeholder="Descrição do produto"></textarea> -->
      </div>
      
      <div class="mb-3">
        <label class="form-label">N° Pedido</label>
        <input name="idpedido" type="text" class="form-control" placeholder="Infome o N° do seu Pedido" required>
      </div>

<div class="mb-3">
  <label class="form-label">Telefone</label>
  <input 
    name="telefone" 
    type="tel" 
    class="form-control" 
    placeholder="(00) 00000-0000" 
    required
    id="telefone"
    maxlength="15"
  >
</div>

<script>
  const telefoneInput = document.getElementById('telefone');

  telefoneInput.addEventListener('input', (e) => {
    let value = e.target.value;
    
    // remove tudo que não é número
    value = value.replace(/\D/g, '');

    // limita a 11 dígitos
    if (value.length > 11) value = value.slice(0, 11);

    // aplica a máscara conforme o tamanho
    if (value.length > 10) {
      value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
    } else if (value.length > 6) {
      value = value.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
    } else if (value.length > 2) {
      value = value.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
    } else {
      value = value.replace(/^(\d*)/, '($1');
    }

    e.target.value = value;
  });

  // impede envio se o número estiver incompleto
  document.querySelector('form')?.addEventListener('submit', (e) => {
    const num = telefoneInput.value.replace(/\D/g, '');
    if (num.length < 10) {
      alert('Por favor, digite um telefone válido com DDD.');
      e.preventDefault();
    }
  });
</script>

        </div> -->

      <div class="mb-3">
        <label class="form-label">Loja</label>
        <select name="loja" class="form-select" required>
          <option value="" selected disabled>Selecione a Loja</option>
          <option value="Brasil Touch Audiovisuais">Brasil Touch Audiovisuais</option>
          <option value="Show de Imagem Audiovisuais">Show de Imagem Audiovisuais</option>
        </select>
      </div>

        </div>

        <div class="mb-3">
          <label class="form-label">Imagem (URL)</label>
          <input name="urllink" type="url" class="form-control" placeholder="Link da imagem">
        </div> -->

      <button type="submit" class="btn btn-primary">Enviar Dados</button>

    </form>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
