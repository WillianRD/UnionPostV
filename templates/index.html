<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Undime — Enviar Dados</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <!-- Bootstrap Icons (para ícones nos campos) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Fonte opcional -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700&display=swap" rel="stylesheet">

  <link rel="shortcut icon" href="../static/Logo/logo.ico" type="imgem/x-icon">
  <style>
    :root {
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --accent: #22c55e;
      --bg1: #0f172a;
      --bg2: #1e3a8a;
      --radius: 18px;
    }

    body {
      font-family: 'Noto Sans', system-ui;
      min-height: 100vh;

      background:
        radial-gradient(60rem 40rem at -10% -10%, rgba(59, 130, 246, .25), transparent),
        radial-gradient(60rem 40rem at 110% 10%, rgba(37, 99, 235, .25), transparent),
        linear-gradient(135deg, var(--bg1), var(--bg2));

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card-lg {

      max-width: 620px;
      width: 100%;

      background: rgba(255, 255, 255, .92);

      backdrop-filter: blur(14px);

      border-radius: var(--radius);

      padding: 45px;

      box-shadow:
        0 40px 80px rgba(0, 0, 0, .35),
        inset 0 1px rgba(255, 255, 255, .3);

      border: 1px solid rgba(255, 255, 255, .15);

      animation: fade .6s ease;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(20px)
      }

      to {
        opacity: 1
      }
    }

    .brand img {
      width: 200px;
      margin-bottom: 10px;
    }

    .brand h1 {
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: -0.5px;
    }

    .brand .sub {
      color: #64748b;
      font-size: .95rem;
    }

    .form-label {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .input-icon {
      position: relative;
    }

    .input-icon .bi {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #64748b;
    }

    .form-control {

      background: #f8fafc;

      border: 1px solid #e2e8f0;

      padding: 14px 14px 14px 40px;

      border-radius: 12px;

      transition: .25s;

      font-size: 15px;
    }

    .form-control:focus {

      background: white;

      border-color: var(--brand);

      box-shadow: 0 0 0 4px rgba(37, 99, 235, .15);

      transform: translateY(-1px);
    }

    .btn-primary {

      background: linear-gradient(135deg, #22c55e, #16a34a);

      border: none;

      padding: 16px;

      font-weight: 700;

      border-radius: 12px;

      transition: .25s;

      letter-spacing: .4px;
    }

    .btn-primary:hover {

      transform: translateY(-2px);

      box-shadow: 0 12px 25px rgba(0, 0, 0, .25);
    }

    .btn-primary:active {
      transform: scale(.98);
    }

    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
      margin: 18px 0 26px;
    }

    .footer {
      text-align: center;
      font-size: .85rem;
      color: #64748b;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="shell">
    <div class="card card-lg p-4 p-md-5">
      <!-- Cabeçalho com logo -->
      <div class="brand mb-3">
        <div class="brand mb-3 text-center">
          <!-- <a href="https://www.unionboard.com.br" target="_blank" rel="noopener noreferrer"> -->

        <div class="mb-3">

<select id="estado" name="estado" class="form-control" required>

</select>

</div>

</div>

        <div class="mb-3">
          <label for="telefone" class="form-label">Telefone (WhatsApp)</label>
          <div class="input-icon">
            <i class="bi bi-telephone"></i>
            <input id="telefone" name="telefone" type="tel" class="form-control" placeholder="(00) 00000-0000"
              maxlength="15" required>

        <div class="d-grid gap-2">

      </form>

      <p class="text-center text-muted mt-3 mb-0" style="font-size:.9rem;">
        Seus dados são usados apenas para contato futuro
      </p>
    </div>
  </div>


  <!-- JS Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>

  <script>
    const telefoneInput = document.getElementById('telefone');

    telefoneInput.addEventListener('input', (e) => {
      let value = e.target.value.replace(/\D/g, '');
      if (value.length > 11) value = value.slice(0, 11);

      if (value.length > 10) {
        value = value.replace(/^(\d{2})(\d{5})(\d{4}).*/, '($1) $2-$3');
      } else if (value.length > 6) {
        value = value.replace(/^(\d{2})(\d{4})(\d{0,4}).*/, '($1) $2-$3');
      } else if (value.length > 2) {
        value = value.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
      } else if (value.length > 0) {
        value = value.replace(/^(\d{0,2})/, '($1');
      }
      e.target.value = value;
    });

    document.querySelector('form')?.addEventListener('submit', (e) => {
      const num = telefoneInput.value.replace(/\D/g, '');
      if (num.length < 10) {
        alert('Por favor, digite um telefone válido com DDD.');
        e.preventDefault();
      }
    });


async function carregarEstados(){

const url = "https://servicodados.ibge.gov.br/api/v1/localidades/estados"

const resposta = await fetch(url)

const estados = await resposta.json()

const select = document.getElementById("estado")

estados.sort((a,b)=>a.nome.localeCompare(b.nome))

estados.forEach(estado => {

const option = document.createElement("option")

option.value = estado.sigla
option.textContent = estado.nome

select.appendChild(option)

})

}

carregarEstados()

document.getElementById("estado").addEventListener("change", async function(){

const uf = this.value

const municipioSelect = document.getElementById("municipio")

municipioSelect.innerHTML = "<option>Carregando...</option>"

const url = `https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`

const resposta = await fetch(url)

const municipios = await resposta.json()

municipioSelect.innerHTML = ""

municipios.forEach(m => {

const option = document.createElement("option")

option.value = m.nome
option.textContent = m.nome

municipioSelect.appendChild(option)

})

})

  </script>
</body>

</html>
