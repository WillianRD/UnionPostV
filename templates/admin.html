<!doctype html>
<html lang="pt-br">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Painel Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f7fb;
}

.card-metric{
border:none;
border-radius:14px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

.table{
background:white;
border-radius:12px;
overflow:hidden;
}

.header-title{
font-weight:700;
}

</style>

</head>

<body>

<div class="container py-5">

<button class="btn btn-primary w-100">
Inicio
<a href="/"</button>

<h2 class="header-title mb-4">
Painel de Participantes
</h2>

<!-- métricas -->

<div class="row mb-4">

<div class="col-md-3">
<div class="card card-metric p-3">
<h6>Total</h6>
<h3>{{ participantes|length }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="card card-metric p-3">
<h6>Prefeitos</h6>
<h3>{{ prefeitos }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="card card-metric p-3">
<h6>Secretários</h6>
<h3>{{ secretarios }}</h3>
</div>
</div>

<div class="col-md-3">
<div class="card card-metric p-3">
<h6>Vice</h6>
<h3>{{ vice }}</h3>
</div>
</div>

</div>


<!-- filtro -->

<div class="card p-3 mb-4">

<form method="get" class="row g-3">

<div class="col-md-4">

<select name="cargo" class="form-select">

<option value="">Filtrar por cargo</option>
<option value="Prefeito">Prefeito</option>
<option value="Vereador">Vereador</option>
<option value="Dirigente Municipal de Educação">Dirigente Municipal de Educação</option>
<option value="Secretário de Educação">Secretário de Educação</option>
<option value="Secretário Adjunto de Educação">Secretário Adjunto de Educação</option>

<option value="Subsecretário de Educação">Subsecretário de Educação</option>

<option value="Diretor de Ensino">Diretor de Ensino</option>
<option value="Diretor Escolar">Diretor Escolar</option>
<option value="Vice-diretor">Vice-diretor</option>

<option value="Coordenador Pedagógico">Coordenador Pedagógico</option>
<option value="Coordenador Educacional">Coordenador Educacional</option>
<option value="Coordenador de Projetos">Coordenador de Projetos</option>

<option value="Supervisor de Ensino">Supervisor de Ensino</option>
<option value="Orientador Educacional">Orientador Educacional</option>

<option value="Professor">Professor</option>

<option value="Técnico Educacional">Técnico Educacional</option>
<option value="Técnico Pedagógico">Técnico Pedagógico</option>
<option value="Técnico Pedagógico">Técnico</option>
<option value="Gestor de Programas Educacionais">Gestor de Programas Educacionais</option>
<option value="Coordenador do Fundeb">Coordenador do Fundeb</option>
<option value="Coordenador da Merenda Escolar">Coordenador da Merenda Escolar</option>
<option value="Analista Educacional">Analista Educacional</option>
<option value="Gestor de Tecnologia Educacional">Gestor de Tecnologia Educacional</option>
<option value="Outro">Outro</option>


</select>

</div>

<div class="col-md-2">

<button class="btn btn-primary w-100">
Filtrar
</button>

</div>

</form>

</div>

<!-- tabela -->

<div class="card p-3">

<div class="table-responsive">

<table class="table table-hover">

<thead class="table-light">

<tr>
<th>ID</th>
<th>Nome</th>
<th>Municipio</th>
<th>Cargo</th>
<th>Telefone</th>
<th>Estado</th>
</tr>

</thead>

<tbody>

{% for p in participantes %}

<tr>

<td>{{ p.id }}</td>

<td>{{ p.nome }}</td>

<td> {{ p.estado }}</td>

<td>{{ p.municipio }}</td>

<td>
<span class="badge bg-primary">
{{ p.cargo }}
</span>
</td>

<td>{{ p.telefone }}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

</div>

</body>
</html>
